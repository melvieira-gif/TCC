<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StarDev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <main>
        <!-- LADO ESQUERDO -->
        <section id="login-container">
            <section class="left">
                <img src="logo.svg" alt="Imagem lateral" id="imagemgrandelogin">
            </section>
    
            <!-- LADO DIREITO -->
            <section class="right">
    
                <section class="login-box">
                    <section>
                        <img src="logoflu.svg" alt="Logo do login" id="logoflu_login">
                    </section>
                    <h2>Acesse a plataforma</h2>
    
                    <label>E-mail</label>
                    <input type="email">
    
                    <label>Senha</label>
                    <input type="password">
    
                    <a href="cadastro.html">não tem um cadastro? Clique aqui</a>
    
                    <button>Entrar</button>
                </section>
            </section>
        </section>
    </main>
    <footer id="footer_login">
        <p class="paragrafo-footer">&copy 2026 StarDev. Todos os direitos reservados.</p>
    </footer>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login-StarDev</title>
</head>
<body id="body_index_cadastro">
    <main id="main_divisao_ld">

        <section id="esquerda">
            <figure id="img_logo_login">
                <a href="index.html" target="_blank"><img src="logo.svg" alt="LOGO_LOGIN_ESQUERDA"></a>
            </figure>
        </section>

        <section id="direita">
            <figure id="img_logoflu_login">
                <img src="logoflu.svg" alt="LOGO_LOGIN_DIREITA">
            </figure>
            <h1>Acesse a Plataforma</h1>
            <label for="email_login" id="label_email_login">E-mail</label>
            <input type="email" id="input_email_login" placeholder="Digite um email...">
            <br><br>
            <label for="senha_login" id="label_senha_login">Senha</label>
            <input type="password" id="input_senha_login" placeholder="Digite uma senha">
            <p>Não tem cadastro ainda? <a href="cadastro.html" target="_self" class="hrefs">Clique aqui</a></p>
            <br><br>
            <button id="btn_login"><strong>Entrar</strong></button>
        </section>
    </main>
</body>
<script>
    document.getElementById("btn_login").addEventListener("click", async (e)=>{
        e.preventDefault()
        const email = document.getElementById("input_email_login").value
        const senha = document.getElementById("input_senha_login").value

        const resposta = await fetch("http://10.111.9.133:3000/login", {
            method:"POST",
            headers:{
                "Accept":"application/json",
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                "email": email,
                "senha": senha
            })
        })
        if(resposta.ok){
            window.location.href = "aulas.html"
        }
    })
</script>
</html>

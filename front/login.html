<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StarDev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <main id="login-container">

        <!-- LADO ESQUERDO -->
        <section class="left">
            <img src="logo.svg" alt="Imagem lateral" id="imagemgrandelogin">
        </section>

        <!-- LADO DIREITO -->
        <section class="right">

            <div class="login-box">
                <span class="tag">> STAR DEV</span>

                <h2>Acesse a plataforma</h2>

                <label>E-mail</label>
                <input type="email">

                <label>Senha</label>
                <input type="password">

                <a href="cadastro.html">não tem um cadastro? Clique aqui</a>

                <button>Entrar</button>
            </div>

        </section>

    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Tela de login -->
    <div id="login-screen">
        <h2>Área Administrativa</h2>
        <input type="password" id="senha" placeholder="Senha" />
        <button onclick="entrar()">Entrar</button>
    </div>

<!-- Painel (fica escondido até logar) -->
    <div id="painel" style="display:none">
        <h2>Adicionar aula</h2>
        <input type="text" id="materia" placeholder="Nome da matéria" />
        <input type="text" id="youtube" placeholder="Link do YouTube" />
        <input type="text" id="titulo-aula" placeholder="Título da aula" />
        <button onclick="salvarAula()">Salvar</button>
        <div id="lista-aulas"></div>
    </div>
</body>
</html>

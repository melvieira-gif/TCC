<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Dados</title>
    <link rel="stylesheet" href="/front/style.css">
    <link rel="icon" type="image/x-icon" href="/front/img/favicon.ico">
</head>
<body id="body_index_cadastro">
    <header id="header_index_cadastro">
        <figure class="logo">
            <a href="/front/index.html" target="_self" class="hrefs">
                <img src="/front/img/logo.svg" alt="LOGOTIPO StarDev">
            </a>
        </figure>
        <nav>
            <figure class="ftichome">
                <a href="/front/aulas.html" target="_self" class="hrefs">
                    <img src="/front/img/home.svg" alt="ICONE HOME">
                </a>
            </figure>
        </nav>
    </header>
    <main>
        <section class="carrossel-container">
            <section class="carrossel drag">
                <p class="card-aula roxo"><a href="/front/aulas/afundamentos.html" target="_blank" class="hrefs_au">Fundamentos da Programação</a></p>
                <p class="card-aula verde"><a href="/front/aulas/alogica.html" target="_blank" class="hrefs_au">Lógica de Programação</a></p>
                <p class="card-aula marrom"><a href="/front/aulas/aweb.html" target="_blank" class="hrefs_au">Desenvolvimento Web</a></p>
                <p class="card-aula amarelo"><a href="/front/aulas/afront.html" target="_blank" class="hrefs_au">Front-end</a></p>
                <p class="card-aula roxo"><a href="/front/aulas/aback.html" target="_blank" class="hrefs_au">Back-End</a></p>
                <p class="card-aula verde"><a href="/front/aulas/adb.html" target="_blank" class="hrefs_au">Banco de Dados</a></p>
                <p class="card-aula marrom"><a href="/front/aulas/aprojetos.html" target="_blank" class="hrefs_au">Projetos</a></p>
                <p class="card-aula amarelo"><a href="/front/aulas/aseguranca.html" target="_blank" class="hrefs_au">Segurança da Informação</a></p>
                <p class="card-aula roxo"><a href="/front/aulas/alimpo.html" target="_blank" class="hrefs_au">Código Limpo</a></p>
                <p class="card-aula verde"><a href="/front/aulas/amobile.html" target="_blank" class="hrefs_au">Desenvolvimento Mobile</a></p>
                <p class="card-aula marrom"><a href="/front/aulas/arede.html" target="_blank" class="hrefs_au">Redes e IOT</a></p>
                <p class="card-aula amarelo"><a href="/front/aulas/alinguagens.html" target="_blank" class="hrefs_au">Linguagem de Programação</a></p>
            </section>
            <section id="listaAulas"></section>
            <!-- CHATBOT -->
            <section id="chatbot-icon">
                <img src="/front/img/logo.svg" alt="DevMentor">
            </section>
            <section id="chatbot">
                <div class="chat-header">DevMentor</div>
                <div id="chat-box"></div>
                <div id="chat-options"></div>
            </section>
        </section>
    </main>
    <script>
        // CARROSSEL
        const carrossel = document.querySelector('.drag');
        let isDown = false;
        let startX;
        let scrollLeft;
        carrossel.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - carrossel.offsetLeft;
            scrollLeft = carrossel.scrollLeft;
        });
        carrossel.addEventListener('mouseleave', () => {
            isDown = false;
        });
        carrossel.addEventListener('mouseup', () => {
            isDown = false;
        });
        carrossel.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - carrossel.offsetLeft;
            const walk = (x - startX) * 2;
            carrossel.scrollLeft = scrollLeft - walk;
        });
        // CHATBOT
        const icon = document.getElementById("chatbot-icon");
        const bot = document.getElementById("chatbot");
        bot.style.display = "none";
        icon.addEventListener("click", () => {
            if (bot.style.display === "none") {
                bot.style.display = "flex";
            } else {
                bot.style.display = "none";
            }
        });
        const chatBox = document.getElementById("chat-box");
        const chatOptions = document.getElementById("chat-options");
        const MATERIA = "Banco de Dados";
        const conteudos = {
            "Banco de Dados": {
                resumo: `
                Banco de Dados é responsável pela lógica do sistema,
                banco de dados, APIs e autenticação.
                `,

                duvida: `
                O Banco de Dados funciona como o cérebro do sistema.
                Ele processa tudo no servidor.
                `,
                proxima: "Banco de Dados"
            }
        };
        chatBox.innerHTML = `
            <p>
                Olá! Eu sou o DevMentor.
                <br>
                Fui programado para te ajudar.
            </p>
        `;
        chatOptions.innerHTML = `
            <button onclick="mostrarResumo(this)">
                Resumo
            </button>
            <button onclick="mostrarDuvida(this)">
                Reexplicar
            </button>
            <button onclick="proximaAula(this)">
                Próxima Aula
            </button>
        `;
        function animarBotao(botao) {
            botao.style.transform = "scale(0.90)";
            botao.style.boxShadow = "0px 0px 20px #eccc6e";
            setTimeout(() => {
                botao.style.transform = "scale(1)";
                botao.style.boxShadow = "none";
            }, 300);
        }
        function mostrarResumo(botao) {
            animarBotao(botao);
            chatBox.innerHTML = `
                <p>${conteudos[MATERIA].resumo}</p>
            `;
        }
        function mostrarDuvida(botao) {
            animarBotao(botao);
            chatBox.innerHTML = `
                <p>${conteudos[MATERIA].duvida}</p>
            `;
        }
        function proximaAula(botao) {
            animarBotao(botao);
            chatBox.innerHTML = `
                <p>
                    Próxima aula:
                    <br><br>
                    <strong>${conteudos[MATERIA].proxima}</strong>
                </p>
            `;
        }
        // VIDEOAULAS
        const API = "http://192.168.2.66:3000/videoaulas";
        const lista = document.getElementById("listaAulas");
        async function carregarAulas() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                lista.innerHTML = "";
                const filtradas = data.filter(
                    a => a.materia === MATERIA
                );
                filtradas.forEach(aula => {
                    lista.innerHTML += `
                        <div class="card-video">
                            <h3>${aula.nomeVAulas}</h3>
                            <p>${aula.descricao}</p>
                            <iframe
                                width="300"
                                height="200"
                                src="${aula.link_video.replace("watch?v=", "embed/")}"
                                frameborder="0"
                                allowfullscreen>
                            </iframe>
                        </div>
                    `;
                });
            } catch (erro) {
                console.log(erro);
                lista.innerHTML = `
                    <p>Erro ao carregar videoaulas.</p>
                `;
            }
        }
        carregarAulas();
    </script>
</body>
</html>

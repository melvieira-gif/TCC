<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarDev</title>
    <link rel="stylesheet" href="/front/style.css">
    <link rel="icon" type="image/x-icon" href="/front/img/favicon.ico">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body id="body_index_cadastro">
    <header id="header_index_cadastro">
        <figure class="logo">
            <a href="/front/index.html" class="hrefs">
                <img src="/front/img/logo.svg" alt="LOGOTIPO StarDev">
            </a>
        </figure>
        <nav>
            <a href="#home">HOME</a>
            <a href="#feedback">FEEDBACK</a>
            <a href="/front/cadastro.html">CADASTRE-SE</a>
            <a href="/front/login.html">LOGIN</a>
        </nav>
    </header>
    <main>
        <section id="ftbanner">
            <img src="/front/img/banner.svg" alt="Banner StarDev" class="banner-bg">
        </section>
        <section id="home" data-aos="fade-up">
            <h2>HOME</h2>
        </section>
        <section id="ftcriadoras">
            <!--eu-->
            <div class="card-3d" data-aos="fade-up">
                <div class="card-inner">
                    <div class="card-front">
                        <img src="/front/img/ftlau.svg" alt="Lauane Pasquini">
                    </div>
                    <div class="card-back">
                        <h3>Lauane Pasquini</h3>
                        <p>Coautora da StarDev</p>
                        <p>Desenvolvedora Front-end</p>
                        <p>Videomaker</p>
                    </div>
                </div>
            </div>
            <!--melissa-->
            <div class="card-3d" data-aos="fade-up" data-aos-delay="200">
                <div class="card-inner">
                    <div class="card-front">
                        <img src="/front/img/ftmel.svg" alt="Melissa Cristina">
                    </div>
                    <div class="card-back">
                        <h3>Melissa Cristina</h3>
                        <p>Coautora da StarDev</p>
                        <p>Desenvolvedora Back-end</p>
                        <p>Database Developer</p>
                    </div>
                </div>
            </div>
        </section>
        <section id="feedback">
            <h2>Nos dê seu feedback</h2>
            <fieldset>
                <legend><b>Informações de contato</b></legend>
                <label for="name">Nome:</label>
                <input type="text" id="name" placeholder="Digite seu nome completo">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Digite seu melhor email">
                <label for="comentarios">Comentários:</label>
                <textarea id="comentarios" placeholder="Digite seus comentários aqui"></textarea>
                <button id="btn_enviar"><strong>Enviar feedback</strong></button>
                <p id="resultadoFale"></p>
            </fieldset>
        </section>
    </main>
    <footer id="footer_index_cadastro">
        <p><a href="/front/cadastro.html" class="hrefs">Cadastre-se</a></p>
        <p class="paragrafo-footer">&copy; 2026 StarDev</p>
    </footer>
</body>
<script>
    // CONTATO
    document.getElementById("btn_enviar").addEventListener("click", async () => {
        const nome = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const comentario = document.getElementById("comentarios").value;
        try {
            const resposta = await fetch("http://192.168.2.66:3000/contato", {
                method: "POST",
                headers: {
                    "Accept": "application/json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    nome: nome,
                    email: email,
                    comentario: comentario
                })
            });
            const dados = await resposta.json();
            if (resposta.ok) {
                mostrarAlerta("Feedback enviado com sucesso!");
                document.getElementById("name").value = "";
                document.getElementById("email").value = "";
                document.getElementById("comentarios").value = "";
            } else {
                mostrarAlerta("Erro ao enviar feedback.");
            }
        } catch (erro) {
            console.log(erro);
            mostrarAlerta("Erro ao conectar com o servidor.");
        }
    });
    // CARDS
    const cards = document.querySelectorAll('.card-3d');
    function ativarFlip() {
        const windowHeight = window.innerHeight;
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const inner = card.querySelector('.card-inner');
            if (rect.top < windowHeight - 150) {
                inner.classList.add('virado');
            }
        });
    }
    window.addEventListener('scroll', ativarFlip);
    cards.forEach(card => {
        card.addEventListener('click', () => {
            const inner = card.querySelector('.card-inner');
            inner.classList.toggle('virado');
        });
    });
    // ALERTA
    function mostrarAlerta(mensagem) {
        const alerta = document.getElementById("alerta");
        const texto = document.getElementById("alerta-texto");
        texto.innerText = mensagem;
        alerta.classList.add("mostrar");
        setTimeout(() => {
            alerta.classList.remove("mostrar");
        }, 3000);
    }
</script>
<div id="alerta" class="alerta">
    <p id="alerta-texto"></p>
</div>
</body>
</html>

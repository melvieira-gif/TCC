<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - StarDev</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <figure class="logo">
            <img src="logo.svg" alt="LOGOTIPO StarDev">
        </figure>
        <nav>
            <a href="index.html">STARDEV</a>
            <a href="cadastro.html">CADASTRA-SE</a>
            <a href="login.html">LOGIN</a>
        </nav>
    </header>
    <main>
        <section id="login-container">
                <figure>
                    <img src="logoflu.svg" alt="LOGOTIPO STARDEV" class="logoflu">
                </figure>
        </section>

        <form>
            <h1 class="title"><strong>Cadastra-se</strong></h1>
            <br><br>

            <h1 class="title"><strong>Cadastra-se</strong></h1>

            <br><br>
            <label for="nome">Nome</label>
            <br>
            <input type="text" id="nome" name="nome" autocomplete="name" placeholder="Digite seu nome completo">
            <br>
            <label for="email">E-mail</label>
            <br>
            <input type="email" id="email" name="email"  autocomplete="email" placeholder="Digite seu e-mail favorito">
            <br>
            <label for="telefone">Telefone</label>
            <br>
            <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000" maxlength="15">
            <br>
            <label for="senha">Senha</label>
            <br>
            <input type="password" id="senha" name="senha" autocomplete="new-password" placeholder="Digite sua senha">
            <br>
            <button type="submit" class="button" id="btn_salvar_cadastro">Cadastrar</button>
            <br>
            <p>Já tem uma conta? <a href="login.html" target="_blank">Clique aqui</a></p>
        </form> 
    </main>
    <footer>
        <p><a href="index.html" target="_blank"><strong>StarDev</strong></a></p>
        <p class="paragrafo-footer">&copy 2026 StarDev. Todos os direitos reservados.</p>
    </footer>
</body>

<script>
    document.getElementById("btn_salvar_cadastro").addEventListener("click", async ()=>{
        const nome = document.getElementById("nome").value
        const email = document.getElementById("email").value
        const senha = document.getElementById("senha").value
        const telefone = document.getElementById("telefone").value

        const resposta = await fetch (`http://111.10.9.133:3000/cadastro`, {
            method:"POST",
            headers:{
                "Accept":"application/json",
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                "nome":nome,
                "email":email,
                "senha":senha,
                "telefone":telefone
            })
        })

        if(resposta.ok){
            const dados = await resposta.json()
            alert(dados.resposta)
        }else{
            alert("algo deu errado !")
        }
    })
</script>
</html>

    <script>
        const token = localStorage.getItem("token")
        if (!token) {
            alert("Você precisa estar logado!")
            window.location.href = "login.html"
        }
        // CARREGAR VÍDEOS
        async function carregarVideos() {
            try {
                const res = await fetch("http://10.111.9.174:3000/videoaulas")
                const videos = await res.json()
                const div = document.getElementById("videos")
                div.innerHTML = ""
                videos.forEach(video => {
                    div.innerHTML += `
                        <div class="cardVideo">
                            <h2>${video.nome_aulas}</h2>
                            <p>${video.descricao}</p>
                            <iframe
                                width="560"
                                height="315"
                                src="${video.link}"
                                title="YouTube video player"
                                frameborder="0"
                                allowfullscreen>
                            </iframe>
                        </div>
                        <hr>
                    `;
                })
            } catch (erro) {
                console.log(erro)
                document.getElementById("videos").innerHTML =
                    "<p>Erro ao carregar vídeos</p>"
            }
            }
            carregarVideos()
    </script>
